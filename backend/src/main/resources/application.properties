spring.application.name=mountain-tracker

# MongoDB
spring.data.mongodb.uri=${MONGO_URI:mongodb://localhost:27017}
spring.data.mongodb.database=${MONGO_DB:mountain_tracker}

# Server
server.port=${PORT:3000}

# Serializzazione: non includere campi null nel JSON
spring.jackson.default-property-inclusion=non_null
spring.jackson.serialization.write-dates-as-timestamps=false
spring.data.mongodb.auto-index-creation=true
